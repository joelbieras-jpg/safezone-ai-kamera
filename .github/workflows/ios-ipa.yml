name: iOS unsigned IPA (für SideStore-Sideload)
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps
        run: npm install --no-audit --no-fund

      - name: Expo prebuild (iOS native project)
        run: npx expo prebuild -p ios --no-install

      - name: CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build UNSIGNED device archive
        run: |
          cd ios
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WS%.xcworkspace}"
          echo "Workspace=$WS Scheme=$SCHEME"
          xcodebuild \
            -workspace "$WS" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package into .ipa (unsigned)
        run: |
          cd ios
          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/*.app Payload/
          zip -qry "SafeZone-unsigned.ipa" Payload
          ls -la SafeZone-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ios/SafeZone-unsigned.ipa
          if-no-files-found: error
